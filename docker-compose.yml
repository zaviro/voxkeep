services:
  funasr:
    image: ${VOXKEEP_ASR_MANAGED_IMAGE:-registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.13}
    container_name: ${VOXKEEP_FUNASR_CONTAINER:-voxkeep-funasr}
    restart: unless-stopped
    ports:
      - "${VOXKEEP_ASR_MANAGED_EXPOSE_PORT:-10096}:10096"

  voxkeep:
    build: .
    container_name: voxkeep
    restart: unless-stopped
    depends_on:
      - funasr
    privileged: true
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - /tmp/.X11-unix:/tmp/.X11-unix
    devices:
      - /dev/snd:/dev/snd
      - /dev/uinput:/dev/uinput
    environment:
      - XDG_SESSION_TYPE=${XDG_SESSION_TYPE:-x11}
      - DISPLAY=${DISPLAY:-:0}
      - YDOTOOL_SOCKET=/tmp/.ydotool_socket
      - VOXKEEP_ASR_MODE=external
      - VOXKEEP_ASR_BACKEND=funasr_ws_external
      - VOXKEEP_ASR_EXTERNAL_HOST=funasr
      - VOXKEEP_ASR_EXTERNAL_PORT=10096
      - VOXKEEP_MANAGE_FUNASR=0
    command: ["/bin/sh", "-lc", "if [ -e /dev/uinput ]; then ydotoold --socket-path /tmp/.ydotool_socket & fi; uv run python -m voxkeep --config config/config.yaml"]
