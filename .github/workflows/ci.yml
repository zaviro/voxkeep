name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  # CI runners do not provide CUDA devices; force CPU path for deterministic behavior.
  ASR_OL_MANAGE_FUNASR: "0"
  ASR_OL_FUNASR_DEVICE: "cpu"
  ASR_OL_FUNASR_NGPU: "0"
  CUDA_VISIBLE_DEVICES: ""

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff Lint
        run: uv run ruff check src tests scripts

      - name: Ruff Format Check
        run: uv run ruff format --check src tests scripts

      - name: Test
        run: uv run pytest -q

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Pyright
        run: uv run pyright

      - name: Shellcheck
        run: uv run pre-commit run shellcheck --all-files

      - name: Actionlint
        run: uv run pre-commit run actionlint --all-files

  runtime-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync runtime-ai dependencies
        run: uv sync --group dev --group runtime-ai

      - name: Prepare wake model assets
        run: uv run python scripts/setup_openwakeword_models.py --retries 5 --retry-sleep 2

      - name: Runtime-ai import check
        run: uv run python scripts/check_runtime_ai.py
