sample_rate: 16000
channels: 1
frame_ms: 32
max_queue_size: 512

funasr:
  host: 127.0.0.1
  port: 10096
  path: /
  use_ssl: false
  reconnect_initial_s: 1.0
  reconnect_max_s: 30.0

wake:
  threshold: 0.5
  rules:
    - keyword: alexa
      enabled: true
      threshold: 0.5
      action: inject_text
    - keyword: hey_jarvis
      enabled: true
      threshold: 0.5
      action: openclaw_agent
    - keyword: hey_mycroft
      enabled: false
      threshold: 0.5
      action: inject_text
    - keyword: hey_rhasspy
      enabled: false
      threshold: 0.5
      action: inject_text
    - keyword: timer
      enabled: false
      threshold: 0.5
      action: inject_text
    - keyword: weather
      enabled: false
      threshold: 0.5
      action: inject_text

vad:
  speech_threshold: 0.5
  silence_ms: 800

capture:
  pre_roll_ms: 600
  armed_timeout_ms: 5000

storage:
  sqlite_path: data/asr.db
  store_final_only: true
  jsonl_debug_path: ""

injector:
  backend: auto
  auto_enter: false
  xdotool_delay_ms: 1

actions:
  openclaw_agent:
    command: ["openclaw", "agent", "--message", "{text}"]
    timeout_s: 20

runtime:
  log_level: INFO
